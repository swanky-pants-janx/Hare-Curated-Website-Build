<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Hare Curated</title>
  <link rel="stylesheet" href="dashboard-style.css">
</head>
<body>
  <div class="login-wrapper">
    <form id="login-form" class="login-form" novalidate>
      <h2>Admin Login</h2>
      <div id="login-error" class="form-error" style="display:none;"></div>
      <div class="form-group">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" placeholder="admin@harecurated.co.za" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" placeholder="Password" autocomplete="current-password" required>
      </div>
      <button id="login-submit" type="submit">Log In</button>
    </form>
  </div>
  <script type="module" src="js/admin/login.js"></script>
</body>
</html>
